name: Agent Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR_MINOR=$(cat src/ClaudeNest.Agent/version.txt | tr -d '[:space:]')
          EXISTING=$(gh release list --json tagName -q "[.[] | select(.tagName | startswith(\"agent-v${MAJOR_MINOR}.\"))] | length")
          VERSION="${MAJOR_MINOR}.${EXISTING}"
          TAG="agent-v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build-agent:
    runs-on: ${{ matrix.os }}
    needs: determine-version
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: claudenest-agent-win-x64.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: claudenest-agent-linux-x64
          - rid: osx-x64
            os: macos-13
            artifact: claudenest-agent-osx-x64
          - rid: osx-arm64
            os: macos-14
            artifact: claudenest-agent-osx-arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Publish agent
        run: >
          dotnet publish src/ClaudeNest.Agent/ClaudeNest.Agent.csproj
          -r ${{ matrix.rid }}
          -c Release
          --self-contained true
          -p:PublishAot=true
          -p:Version=${{ needs.determine-version.outputs.version }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item "src/ClaudeNest.Agent/bin/Release/net10.0/${{ matrix.rid }}/publish/ClaudeNest.Agent.exe" "${{ matrix.artifact }}"
        shell: pwsh

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv "src/ClaudeNest.Agent/bin/Release/net10.0/${{ matrix.rid }}/publish/ClaudeNest.Agent" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    runs-on: ubuntu-latest
    needs: [determine-version, build-agent]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.determine-version.outputs.tag }}
          name: "Agent ${{ needs.determine-version.outputs.version }}"
          body: "ClaudeNest Agent v${{ needs.determine-version.outputs.version }}"
          files: |
            claudenest-agent-win-x64.exe
            claudenest-agent-linux-x64
            claudenest-agent-osx-x64
            claudenest-agent-osx-arm64
