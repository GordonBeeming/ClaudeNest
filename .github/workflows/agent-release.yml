name: 📦 Agent Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/agent-release.yml"
      - "src/ClaudeNest.Agent/**"
      - "src/ClaudeNest.Shared/**"
      - "src/ClaudeNest.ServiceDefaults/**"

permissions:
  contents: write
  id-token: write
  variables: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: version
        run: |
          VERSION="$(date -u +'%Y.%-m.%-d').${{ github.run_number }}"
          TAG="agent-v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build-agent:
    runs-on: ${{ matrix.os }}
    needs: determine-version
    environment: prod
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: claudenest-agent-win-x64.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: claudenest-agent-linux-x64
          - rid: osx-x64
            os: macos-latest
            artifact: claudenest-agent-osx-x64
          - rid: osx-arm64
            os: macos-latest
            artifact: claudenest-agent-osx-arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Publish agent
        run: >
          dotnet publish src/ClaudeNest.Agent/ClaudeNest.Agent.csproj
          -r ${{ matrix.rid }}
          -c Release
          --self-contained true
          -p:PublishAot=true
          -p:Version=${{ needs.determine-version.outputs.version }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item "src/ClaudeNest.Agent/bin/Release/net10.0/${{ matrix.rid }}/publish/ClaudeNest.Agent.exe" "${{ matrix.artifact }}"
        shell: pwsh

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv "src/ClaudeNest.Agent/bin/Release/net10.0/${{ matrix.rid }}/publish/ClaudeNest.Agent" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    runs-on: ubuntu-latest
    needs: [determine-version, build-agent]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.determine-version.outputs.tag }}
          name: "Agent ${{ needs.determine-version.outputs.version }}"
          body: "ClaudeNest Agent v${{ needs.determine-version.outputs.version }}"
          files: |
            claudenest-agent-win-x64.exe
            claudenest-agent-linux-x64
            claudenest-agent-osx-x64
            claudenest-agent-osx-arm64
            scripts/install.sh
            scripts/install.ps1

  update-backend-version:
    runs-on: ubuntu-latest
    needs: [determine-version, create-release]
    environment: prod
    concurrency:
      group: deploy-infra
      cancel-in-progress: false
    steps:
      - name: Update AGENT_LATEST_VERSION repo variable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set AGENT_LATEST_VERSION \
            --repo ${{ github.repository }} \
            --body "${{ needs.determine-version.outputs.version }}"

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend Agent__LatestVersion
        run: |
          az containerapp update \
            --name ${{ vars.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --set-env-vars Agent__LatestVersion=${{ needs.determine-version.outputs.version }}
