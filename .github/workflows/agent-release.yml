name: 📦 Agent Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/agent-release.yml"
      - "src/ClaudeNest.Agent/**"
      - "src/ClaudeNest.Shared/**"
      - "src/ClaudeNest.ServiceDefaults/**"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: version
        run: |
          VERSION="$(date -u +'%Y.%-m.%-d').${{ github.run_number }}"
          TAG="agent-v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build-agent:
    runs-on: ${{ matrix.os }}
    needs: determine-version
    environment: prod
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: claudenest-agent-win-x64.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: claudenest-agent-linux-x64
          - rid: osx-x64
            os: macos-latest
            artifact: claudenest-agent-osx-x64
          - rid: osx-arm64
            os: macos-latest
            artifact: claudenest-agent-osx-arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Publish agent
        run: >
          dotnet publish src/ClaudeNest.Agent/ClaudeNest.Agent.csproj
          -r ${{ matrix.rid }}
          -c Release
          --self-contained true
          -p:PublishAot=true
          -p:Version=${{ needs.determine-version.outputs.version }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item "src/ClaudeNest.Agent/bin/Release/net10.0/${{ matrix.rid }}/publish/ClaudeNest.Agent.exe" "${{ matrix.artifact }}"
        shell: pwsh

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv "src/ClaudeNest.Agent/bin/Release/net10.0/${{ matrix.rid }}/publish/ClaudeNest.Agent" "${{ matrix.artifact }}"

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --options runtime --sign "Developer ID Application: Gordon Beeming (89DBN36T4T)" "${{ matrix.artifact }}"
          codesign -dv --verbose=4 "${{ matrix.artifact }}"

      - name: Notarize macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          ZIP_PATH="$RUNNER_TEMP/${{ matrix.artifact }}.zip"
          ditto -c -k --keepParent "${{ matrix.artifact }}" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait

      - name: Cleanup keychain
        if: ${{ always() && runner.os == 'macOS' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    runs-on: ubuntu-latest
    needs: [determine-version, build-agent]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.determine-version.outputs.tag }}
          name: "Agent ${{ needs.determine-version.outputs.version }}"
          body: "ClaudeNest Agent v${{ needs.determine-version.outputs.version }}"
          files: |
            claudenest-agent-win-x64.exe
            claudenest-agent-linux-x64
            claudenest-agent-osx-x64
            claudenest-agent-osx-arm64
