name: 🚀 Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "src/ClaudeNest.Backend/**"
      - "src/ClaudeNest.Shared/**"
      - "src/ClaudeNest.ServiceDefaults/**"
      - "src/claudenest-web/**"
      - "scripts/**"

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  VERSION: "" # set dynamically in determine-version job

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          VERSION="$(date -u +'%Y.%-m.%-d').${{ github.run_number }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: determine-version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-restore --no-build

  build-backend:
    runs-on: ubuntu-latest
    environment: prod
    needs: [determine-version, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ vars.ACR_REGISTRY_NAME }}

      - name: Build and push backend image
        run: |
          docker build \
            -f src/ClaudeNest.Backend/Dockerfile \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend:${{ needs.determine-version.outputs.version }} \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend:latest \
            .
          docker push ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend --all-tags

  build-frontend:
    runs-on: ubuntu-latest
    environment: prod
    needs: determine-version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ vars.ACR_REGISTRY_NAME }}

      - name: Build and push frontend image
        run: |
          docker build \
            -f src/claudenest-web/Dockerfile \
            --build-arg VITE_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} \
            --build-arg VITE_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }} \
            --build-arg VITE_AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }} \
            --build-arg VITE_APPINSIGHTS_CONNECTION_STRING=${{ secrets.APPINSIGHTS_CONNECTION_STRING }} \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend:${{ needs.determine-version.outputs.version }} \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend:latest \
            .
          docker push ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend --all-tags

  deploy:
    runs-on: ubuntu-latest
    environment: prod
    needs: [determine-version, build-backend, build-frontend]
    steps:
      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name ${{ vars.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend:${{ needs.determine-version.outputs.version }}

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend:${{ needs.determine-version.outputs.version }}
