name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'src/ClaudeNest.Backend/**'
      - 'src/ClaudeNest.Shared/**'
      - 'src/ClaudeNest.ServiceDefaults/**'
      - 'src/claudenest-web/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ vars.ACR_REGISTRY_NAME }}

      - name: Build and push backend image
        run: |
          docker build \
            -f src/ClaudeNest.Backend/Dockerfile \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend:${{ github.sha }} \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend:latest \
            .
          docker push ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend --all-tags

  build-frontend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ vars.ACR_REGISTRY_NAME }}

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} \
            --build-arg VITE_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }} \
            --build-arg VITE_AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }} \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend:${{ github.sha }} \
            -t ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend:latest \
            src/claudenest-web/
          docker push ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend --all-tags

  deploy:
    runs-on: ubuntu-latest
    environment: prod
    needs: [build-backend, build-frontend]
    steps:
      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name ${{ vars.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-backend:${{ github.sha }}

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.ACR_REGISTRY_NAME }}.azurecr.io/claudenest-frontend:${{ github.sha }}
