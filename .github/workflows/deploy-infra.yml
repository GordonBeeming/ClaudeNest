name: 🏗️ Deploy Infrastructure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-infra.yml"
      - "infra/**"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read current agent version from live backend
        id: agent-version
        run: |
          VERSION=$(az containerapp show \
            --name ${{ vars.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='Agent__LatestVersion'].value | [0]" \
            -o tsv 2>/dev/null || echo "1.0.0")
          echo "version=${VERSION:-1.0.0}" >> $GITHUB_OUTPUT

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
              environmentName='${{ vars.ENVIRONMENT_NAME }}' \
              auth0Authority='${{ secrets.AUTH0_AUTHORITY }}' \
              auth0Audience='${{ secrets.AUTH0_AUDIENCE }}' \
              auth0Domain='${{ secrets.AUTH0_DOMAIN }}' \
              auth0ClientId='${{ secrets.AUTH0_CLIENT_ID }}' \
              stripeSecretKey='${{ secrets.STRIPE_SECRET_KEY }}' \
              stripeWebhookSecret='${{ secrets.STRIPE_WEBHOOK_SECRET }}' \
              stripePublishableKey='${{ secrets.STRIPE_PUBLISHABLE_KEY }}' \
              stripeCurrency='${{ vars.STRIPE_CURRENCY }}' \
              cloudflareTunnelToken='${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}' \
              agentLatestVersion='${{ steps.agent-version.outputs.version }}' \
              backendImageTag='latest' \
              frontendImageTag='latest'
